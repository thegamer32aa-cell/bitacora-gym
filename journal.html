<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Diario de Productividad</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diario">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#101114">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="shared/styles.css">
<style>
  .top3-input{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .top3-input:last-child{margin-bottom:0;}
  .top3-idx{font-family:'JetBrains Mono',monospace;color:var(--text-3);font-size:13px;width:16px;flex-shrink:0;}
  .link-note{font-size:12px;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
</style>
</head>
<body>

<a class="back-link" href="index.html">‹ Inicio</a>
<div class="top">
  <span class="brand">Diario · Productividad</span>
  <div class="status-row"><span class="status-dot" id="statusDot"></span><span id="statusText">sin conectar</span></div>
</div>

<div class="card">
  <label class="field-label">📊 Puntuación de productividad hoy</label>
  <div class="slider-row">
    <input type="range" id="productividad" min="1" max="10" step="1" value="7">
    <span class="slider-val" id="productividadVal">7</span>
  </div>
</div>

<div class="card">
  <label class="field-label">⚡ Energía / foco hoy</label>
  <div class="slider-row">
    <input type="range" id="energiaFoco" min="1" max="10" step="1" value="7">
    <span class="slider-val" id="energiaFocoVal">7</span>
  </div>
</div>

<div class="card">
  <label class="field-label">🎯 Las 3 cosas más importantes que me propuse hoy</label>
  <div class="top3-input"><span class="top3-idx">1.</span><input type="text" id="top1Hoy"></div>
  <div class="top3-input"><span class="top3-idx">2.</span><input type="text" id="top2Hoy"></div>
  <div class="top3-input"><span class="top3-idx">3.</span><input type="text" id="top3Hoy"></div>
</div>

<div class="card">
  <label class="field-label">✅ Qué logré de verdad</label>
  <textarea id="logrado"></textarea>
</div>

<div class="card">
  <label class="field-label">❌ Qué no logré y por qué (sin excusas, causa real)</label>
  <textarea id="noLogrado"></textarea>
</div>

<div class="card">
  <label class="field-label">🧠 Qué me robó más tiempo o me distrajo</label>
  <textarea id="distraccion"></textarea>
</div>

<div class="card">
  <label class="field-label">🪞 ¿Hice algo hoy que me acerque al hombre que quiero ser?</label>
  <div class="link-note">→ [[EL HOMBRE QUE ME QUIERO CONVERTIR]]</div>
  <textarea id="hombreReflexion"></textarea>
</div>

<div class="card">
  <label class="field-label">💡 Una cosa que aprendí o noté hoy</label>
  <textarea id="aprendizaje"></textarea>
</div>

<div class="card">
  <label class="field-label">🔄 Qué voy a hacer diferente mañana</label>
  <textarea id="diferente"></textarea>
</div>

<div class="card">
  <label class="field-label">🎯 Las 3 cosas más importantes de mañana</label>
  <div class="top3-input"><span class="top3-idx">1.</span><input type="text" id="top1Manana"></div>
  <div class="top3-input"><span class="top3-idx">2.</span><input type="text" id="top2Manana"></div>
  <div class="top3-input"><span class="top3-idx">3.</span><input type="text" id="top3Manana"></div>
</div>

<div class="btn-row">
  <button class="btn" id="btnConnect">Conectar con Google Drive</button>
  <button class="btn primary" id="btnSave" disabled>Guardar entrada</button>
</div>

<div class="setup" id="setupNote"></div>
<div class="toast" id="toast"></div>

<script src="shared/drive-auth.js"></script>
<script>
const CONFIG = {
  CLIENT_ID: "441287844321-aogess41472vgr7o74s9bel12ftb067q.apps.googleusercontent.com",
  API_KEY: "AIzaSyBpEczqZdQfkvgMGll1Le8YjMgEwGDssbY",
  SCOPE: "https://www.googleapis.com/auth/drive.file",
  FOLDER_PATH: ["Diario de Produ1"]
};

const drive = new DriveApp(CONFIG);

document.getElementById("productividad").oninput = e => document.getElementById("productividadVal").textContent = e.target.value;
document.getElementById("energiaFoco").oninput = e => document.getElementById("energiaFocoVal").textContent = e.target.value;

function showToast(msg, kind){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (kind || "");
  setTimeout(() => { t.className = "toast"; }, 3200);
}

function setConnected(on){
  document.getElementById("statusDot").classList.toggle("ok", on);
  document.getElementById("statusText").textContent = on ? "conectado" : "sin conectar";
  document.getElementById("btnSave").disabled = !on;
  document.getElementById("btnConnect").textContent = on ? "Reconectar Google Drive" : "Conectar con Google Drive";
}

drive.onStatusChange = (connected) => {
  setConnected(connected);
  if(connected) showToast("Conectado a Google Drive", "ok");
};

document.getElementById("btnConnect").onclick = () => {
  if(CONFIG.CLIENT_ID.includes("TU_CLIENT_ID")){
    showToast("Falta configurar el Client ID de Google", "err");
    return;
  }
  drive.connect();
};

function fechaTitulo(){
  const d = new Date();
  const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  return `${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
}

function val(id){ return document.getElementById(id).value.trim(); }

function buildMarkdown(){
  return `### ${fechaTitulo()}

**📊 Puntuación de productividad hoy (1-10):** ${val("productividad")}
**⚡ Energía / foco hoy (1-10):** ${val("energiaFoco")}

**🎯 Las 3 cosas más importantes que me propuse hoy:**
1. ${val("top1Hoy")}
2. ${val("top2Hoy")}
3. ${val("top3Hoy")}

**✅ Qué logré de verdad:**
${val("logrado")}

**❌ Qué no logré y por qué (sin excusas, causa real):**
${val("noLogrado")}

**🧠 Qué me robó más tiempo o me distrajo:**
${val("distraccion")}

**🪞 ¿Hice algo hoy que me acerque al hombre que quiero ser?** → [[EL HOMBRE QUE ME QUIERO CONVERTIR]]
${val("hombreReflexion")}

**💡 Una cosa que aprendí o noté hoy:**
${val("aprendizaje")}

**🔄 Qué voy a hacer diferente mañana:**
${val("diferente")}

**🎯 Las 3 cosas más importantes de mañana:**
1. ${val("top1Manana")}
2. ${val("top2Manana")}
3. ${val("top3Manana")}
`;
}

document.getElementById("btnSave").onclick = async () => {
  const btn = document.getElementById("btnSave");
  btn.disabled = true;
  btn.textContent = "Guardando…";
  try{
    const folderId = await drive.ensureFolderPath(CONFIG.FOLDER_PATH);
    const content = buildMarkdown();
    const filename = `${fechaISO()} — Diario.md`;
    await drive.uploadMarkdown(folderId, filename, content);
    showToast("Entrada guardada en Drive", "ok");
  }catch(err){
    showToast("No se pudo guardar. Revisa la conexión.", "err");
    console.error(err);
  }finally{
    btn.disabled = false;
    btn.textContent = "Guardar entrada";
  }
};

document.getElementById("setupNote").innerHTML =
  CONFIG.CLIENT_ID.includes("TU_CLIENT_ID")
    ? "Configura tu Client ID de Google en el código antes de usar la app."
    : "";

window.addEventListener("load", () => {
  setTimeout(() => drive.initGoogle(), 400);
});
</script>
</body>
</html>
