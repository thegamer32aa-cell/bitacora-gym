<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Presión Arterial</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Presión">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#101114">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="shared/styles.css">
<style>
  .plate{
    position:relative;width:118px;height:118px;border-radius:50%;
    border:7px solid var(--border-strong);
    background:radial-gradient(circle at 50% 42%, var(--surface-2) 0%, var(--surface) 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    margin:6px auto 18px;
  }
  .plate .num{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--accent);line-height:1;}
  .plate .of{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);margin-top:2px;}
  .barbell{display:flex;align-items:center;gap:0;margin:24px 0;}
  .barbell .dot{width:6px;height:6px;border-radius:50%;background:var(--border-strong);flex-shrink:0;}
  .barbell .bar{flex:1;height:1px;background:var(--border-strong);}
  .chip-row{display:flex;gap:8px;}
  .chip{flex:1;padding:10px;text-align:center;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);font-size:13px;cursor:pointer;}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#221a05;font-weight:600;}
</style>
</head>
<body>

<a class="back-link" href="index.html">‹ Inicio</a>
<div class="top">
  <span class="brand">Presión Arterial</span>
  <div class="status-row"><span class="status-dot" id="statusDot"></span><span id="statusText">sin conectar</span></div>
</div>

<div class="plate">
  <div class="num" id="lastReading">—</div>
  <div class="of" id="dateSub"></div>
</div>

<div class="barbell"><div class="dot"></div><div class="bar"></div><div class="dot"></div></div>

<div class="card">
  <label class="field-label">Toma</label>
  <div class="field-row">
    <div>
      <label class="field-label">Sistólica (mmHg)</label>
      <input type="number" inputmode="numeric" id="sistolica" placeholder="120">
    </div>
    <div>
      <label class="field-label">Diastólica (mmHg)</label>
      <input type="number" inputmode="numeric" id="diastolica" placeholder="80">
    </div>
  </div>
  <div class="field-row" style="grid-template-columns:1fr;">
    <div>
      <label class="field-label">Pulso (lpm)</label>
      <input type="number" inputmode="numeric" id="pulso" placeholder="70">
    </div>
  </div>
</div>

<div class="card">
  <label class="field-label">Momento del día</label>
  <div class="chip-row" id="momentoChips">
    <div class="chip" data-val="Mañana">Mañana</div>
    <div class="chip" data-val="Tarde">Tarde</div>
    <div class="chip" data-val="Noche">Noche</div>
  </div>
</div>

<div class="card">
  <label class="field-label">Brazo</label>
  <div class="chip-row" id="brazoChips">
    <div class="chip" data-val="Izquierdo">Izquierdo</div>
    <div class="chip" data-val="Derecho">Derecho</div>
  </div>
</div>

<div class="card">
  <label class="field-label">Notas</label>
  <textarea id="notas" placeholder="¿Cómo te encontrabas? ¿Tomaste medicación? ¿Estrés, cafeína, ejercicio reciente?"></textarea>
</div>

<div class="btn-row">
  <button class="btn" id="btnConnect">Conectar con Google Drive</button>
  <button class="btn primary" id="btnSave" disabled>Guardar toma</button>
</div>

<div class="setup" id="setupNote"></div>
<div class="toast" id="toast"></div>

<script src="shared/drive-auth.js"></script>
<script>
const CONFIG = {
  CLIENT_ID: "441287844321-aogess41472vgr7o74s9bel12ftb067q.apps.googleusercontent.com",
  API_KEY: "AIzaSyBpEczqZdQfkvgMGll1Le8YjMgEwGDssbY",
  SCOPE: "https://www.googleapis.com/auth/drive.file",
  FOLDER_PATH: ["Presión Arterial"]
};

const drive = new DriveApp(CONFIG);
let state = { momento: null, brazo: null };

function nowHHMM(){
  const d = new Date();
  const pad = n => n.toString().padStart(2,"0");
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function autoMomento(){
  const h = new Date().getHours();
  if(h < 13) return "Mañana";
  if(h < 20) return "Tarde";
  return "Noche";
}

function setupChips(containerId, stateKey, defaultVal){
  const container = document.getElementById(containerId);
  const chips = [...container.querySelectorAll(".chip")];
  chips.forEach(chip => {
    chip.onclick = () => {
      chips.forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      state[stateKey] = chip.dataset.val;
    };
  });
  const def = chips.find(c => c.dataset.val === defaultVal) || chips[0];
  def.click();
}

function showToast(msg, kind){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (kind || "");
  setTimeout(() => { t.className = "toast"; }, 3200);
}

function setConnected(on){
  document.getElementById("statusDot").classList.toggle("ok", on);
  document.getElementById("statusText").textContent = on ? "conectado" : "sin conectar";
  document.getElementById("btnSave").disabled = !on;
  document.getElementById("btnConnect").textContent = on ? "Reconectar Google Drive" : "Conectar con Google Drive";
}

drive.onStatusChange = (connected) => {
  setConnected(connected);
  if(connected) showToast("Conectado a Google Drive", "ok");
};

document.getElementById("btnConnect").onclick = () => {
  if(CONFIG.CLIENT_ID.includes("TU_CLIENT_ID")){
    showToast("Falta configurar el Client ID de Google", "err");
    return;
  }
  drive.connect();
};

document.getElementById("sistolica").oninput = e => {
  document.getElementById("lastReading").textContent = e.target.value || "—";
};

function buildMarkdown(){
  const fecha = fechaISO();
  const hora = nowHHMM();
  const sis = document.getElementById("sistolica").value;
  const dia = document.getElementById("diastolica").value;
  const pulso = document.getElementById("pulso").value;
  const notas = document.getElementById("notas").value.trim();

  return `---
fecha: ${fecha}
hora: ${hora}
sistólica: ${sis}
diastólica: ${dia}
pulso: ${pulso}
momento: ${state.momento}
brazo: ${state.brazo}
tags: [salud, presion-arterial, app]
---

# 🫀 ${fecha} ${hora} — ${sis}/${dia} mmHg

**Sistólica:** ${sis || "—"} mmHg
**Diastólica:** ${dia || "—"} mmHg
**Pulso:** ${pulso || "—"} lpm
**Momento del día:** ${state.momento}
**Brazo:** ${state.brazo}

**Notas:**
${notas || "—"}
`;
}

document.getElementById("btnSave").onclick = async () => {
  const sis = document.getElementById("sistolica").value;
  const dia = document.getElementById("diastolica").value;
  if(!sis || !dia){
    showToast("Rellena al menos sistólica y diastólica", "err");
    return;
  }
  const btn = document.getElementById("btnSave");
  btn.disabled = true;
  btn.textContent = "Guardando…";
  try{
    const folderId = await drive.ensureFolderPath(CONFIG.FOLDER_PATH);
    const content = buildMarkdown();
    const filename = `${fechaISO()} ${nowHHMM().replace(":","")} — Presión ${sis}-${dia}.md`;
    await drive.uploadMarkdown(folderId, filename, content);
    showToast("Toma guardada en Drive", "ok");
    document.getElementById("sistolica").value = "";
    document.getElementById("diastolica").value = "";
    document.getElementById("pulso").value = "";
    document.getElementById("notas").value = "";
  }catch(err){
    showToast("No se pudo guardar. Revisa la conexión.", "err");
    console.error(err);
  }finally{
    btn.disabled = false;
    btn.textContent = "Guardar toma";
  }
};

document.getElementById("setupNote").innerHTML =
  CONFIG.CLIENT_ID.includes("TU_CLIENT_ID")
    ? "Configura tu Client ID de Google en el código antes de usar la app."
    : "";

document.getElementById("dateSub").textContent = fechaLarga();
setupChips("momentoChips", "momento", autoMomento());
setupChips("brazoChips", "brazo", "Izquierdo");

window.addEventListener("load", () => {
  setTimeout(() => drive.initGoogle(), 400);
});
</script>
</body>
</html>
